name: Release

# Triggered by version tags (v1.2.3) or manual dispatch
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"   # pre-release: v1.0.0-beta.1
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.2.0)"
        required: true
      prerelease:
        description: "Mark as pre-release"
        required: false
        default: "false"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # 1. Create the GitHub Release (published immediately so "latest" URL works)
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.release_id }}
    steps:
      - uses: actions/checkout@v4

      - name: Create or fetch release
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const tag      = process.env.RELEASE_TAG;
            const isPrerel = tag.includes('-') ||
                             '${{ github.event.inputs.prerelease }}' === 'true';
            const { owner, repo } = context.repo;

            // Reuse if already exists (idempotent re-run)
            try {
              const r = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              core.setOutput('release_id', String(r.data.id));
              return;
            } catch (e) {
              if (e.status !== 404) throw e;
            }

            const r = await github.rest.repos.createRelease({
              owner, repo,
              tag_name:   tag,
              name:       `ObsShogi ${tag}`,
              body:       `## What's new\n\n*See the assets below to download and install.*`,
              draft:      false,   // must be false for latest/download/ URL to resolve
              prerelease: isPrerel,
            });
            core.setOutput('release_id', String(r.data.id));

  # 2. Build, sign and upload bundles for every target platform
  build:
    name: Build · ${{ matrix.name }}
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── macOS ──────────────────────────────────────────────────────────
          - name: macOS-arm64
            runner: macos-latest
            rust_target: aarch64-apple-darwin
            tauri_args: --target aarch64-apple-darwin

          - name: macOS-x64
            runner: macos-latest
            rust_target: x86_64-apple-darwin
            tauri_args: --target x86_64-apple-darwin

          # ── Windows ────────────────────────────────────────────────────────
          - name: Windows-x64
            runner: windows-latest
            rust_target: ""
            tauri_args: ""

          # ── Linux ──────────────────────────────────────────────────────────
          - name: Linux-x64
            runner: ubuntu-22.04
            rust_target: ""
            tauri_args: ""

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      # ── System dependencies ───────────────────────────────────────────────
      - name: Install Linux system dependencies
        if: matrix.runner == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config

      # ── Toolchains ────────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
          key: ${{ matrix.name }}

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Install frontend dependencies
        run: npm ci

      - name: Derive version from tag (strip leading "v")
        shell: bash
        run: echo "RELEASE_VERSION=${RELEASE_TAG#v}" >> $GITHUB_ENV

      - name: Build, sign & upload
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing key (stored in repo Secrets)
          TAURI_SIGNING_PRIVATE_KEY:          ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId:   ${{ needs.create-release.outputs.release_id }}
          tagName:     ${{ env.RELEASE_TAG }}
          appVersion:  ${{ env.RELEASE_VERSION }}
          args:        ${{ matrix.tauri_args }}

          # Generates and uploads latest.json so the updater endpoint resolves
          includeUpdaterJson: true

          # Human-readable asset names:
          # ObsShogi-v0.2.0-darwin-aarch64.dmg
          # ObsShogi-v0.2.0-windows-x86_64-setup.exe
          # ObsShogi-v0.2.0-linux-x86_64.AppImage
          assetNamePattern: "ObsShogi-v[version]-[platform]-[arch][setup][ext]"
